# Console lisible : on garde les logs INFO de Streams (utiles pour voir les rebalances),
# mais on coupe le bruit DEBUG. Passez en "warn" si la sortie est trop verbeuse.
org.slf4j.simpleLogger.defaultLogLevel=info
org.slf4j.simpleLogger.showThreadName=false
org.slf4j.simpleLogger.showLogName=false
org.slf4j.simpleLogger.showDateTime=true
org.slf4j.simpleLogger.dateTimeFormat=HH:mm:ss
