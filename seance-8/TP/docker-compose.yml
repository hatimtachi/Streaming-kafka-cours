# TP Seance 8 - Cluster Kafka a 3 brokers (KRaft) + Schema Registry + Kafka Connect + Kafbat UI
# ESGI - 5e annee - Data Engineering - Stream Processing avec Apache Kafka
#
# Kafka Connect : integration sources/sinks sans code.
# Demarrage : docker compose up -d        UI : http://localhost:8080
#
# Adresses des brokers (IMPORTANT, conformes au support du cours) :
#   - depuis votre machine (CLI hote / code Java) : localhost:29092 / 29093 / 29094
#   - a l'interieur du reseau Docker (UI, kcli)    : broker-1:9092 / broker-2:9092 / broker-3:9092
name: tp-kafka-s8

x-kafka-common: &kafka-common
  image: apache/kafka:4.3.0
  restart: unless-stopped

x-kafka-env-common: &kafka-env-common
  KAFKA_PROCESS_ROLES: broker,controller
  KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker-1:9093,2@broker-2:9093,3@broker-3:9093
  KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
  KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,HOST:PLAINTEXT,DOCKER:PLAINTEXT
  KAFKA_INTER_BROKER_LISTENER_NAME: DOCKER
  # HOST : acces hote (port 29092 dans le conteneur) ; DOCKER : reseau interne (9092)
  KAFKA_LISTENERS: HOST://0.0.0.0:29092,DOCKER://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
  KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
  KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
  KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
  KAFKA_DEFAULT_REPLICATION_FACTOR: 3
  KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
  KAFKA_NUM_PARTITIONS: 3
  KAFKA_LOG_DIRS: /var/lib/kafka/data

x-kafka-healthcheck: &kafka-healthcheck
  test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
  interval: 10s
  timeout: 10s
  retries: 20
  start_period: 25s

services:
  broker-1:
    <<: *kafka-common
    container_name: broker-1
    hostname: broker-1
    ports:
      - "29092:29092"        # CLI hote / code Java -> localhost:29092
    environment:
      <<: *kafka-env-common
      KAFKA_NODE_ID: 1
      KAFKA_ADVERTISED_LISTENERS: HOST://localhost:29092,DOCKER://broker-1:9092
    volumes:
      - broker-1-data:/var/lib/kafka/data
    healthcheck: *kafka-healthcheck

  broker-2:
    <<: *kafka-common
    container_name: broker-2
    hostname: broker-2
    ports:
      - "29093:29092"        # CLI hote -> localhost:29093
    environment:
      <<: *kafka-env-common
      KAFKA_NODE_ID: 2
      KAFKA_ADVERTISED_LISTENERS: HOST://localhost:29093,DOCKER://broker-2:9092
    volumes:
      - broker-2-data:/var/lib/kafka/data
    healthcheck: *kafka-healthcheck

  broker-3:
    <<: *kafka-common
    container_name: broker-3
    hostname: broker-3
    ports:
      - "29094:29092"        # CLI hote -> localhost:29094
    environment:
      <<: *kafka-env-common
      KAFKA_NODE_ID: 3
      KAFKA_ADVERTISED_LISTENERS: HOST://localhost:29094,DOCKER://broker-3:9092
    volumes:
      - broker-3-data:/var/lib/kafka/data
    healthcheck: *kafka-healthcheck

  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:v1.4.2
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: broker-1:9092,broker-2:9092,broker-3:9092
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      broker-1:
        condition: service_healthy
      broker-2:
        condition: service_healthy
      broker-3:
        condition: service_healthy

  schema-registry:
    image: confluentinc/cp-schema-registry:8.3.0
    container_name: schema-registry
    hostname: schema-registry
    ports:
      - "8081:8081"          # API REST du registre -> http://localhost:8081
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      # Le registre est un CLIENT des brokers : adresse interne du reseau Docker
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://broker-1:9092,broker-2:9092,broker-3:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    depends_on:
      broker-1:
        condition: service_healthy
      broker-2:
        condition: service_healthy
      broker-3:
        condition: service_healthy

  connect:
    image: confluentinc/cp-kafka-connect:8.3.0
    container_name: connect
    hostname: connect
    ports:
      - "8083:8083"          # API REST de Kafka Connect -> http://localhost:8083
    environment:
      # Le worker est un CLIENT des brokers : adresse interne du reseau Docker
      CONNECT_BOOTSTRAP_SERVERS: broker-1:9092,broker-2:9092,broker-3:9092
      CONNECT_GROUP_ID: connect-cluster
      CONNECT_REST_ADVERTISED_HOST_NAME: connect
      CONNECT_REST_PORT: 8083
      # Topics internes (etat du cluster Connect) - RF 3 car 3 brokers
      CONNECT_CONFIG_STORAGE_TOPIC: connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 3
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 3
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 3
      # Convertisseurs par defaut (surchargeables par connecteur)
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      # IMPORTANT : les connecteurs FileStream vivent dans /usr/share/filestream-connectors
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components,/usr/share/filestream-connectors
    volumes:
      - ./data:/data        # fichiers lus/ecrits par les connecteurs FileStream
    depends_on:
      broker-1:
        condition: service_healthy
      broker-2:
        condition: service_healthy
      broker-3:
        condition: service_healthy
      schema-registry:
        condition: service_started

volumes:
  broker-1-data:
  broker-2-data:
  broker-3-data:
